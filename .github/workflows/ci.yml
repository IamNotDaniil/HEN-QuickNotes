name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check
        run: |
          test -z "$(gofmt -l ./cmd ./internal)"

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build ./cmd/server
