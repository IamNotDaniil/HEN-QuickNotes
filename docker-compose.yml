version: "3.9"

services:
  quicknotes:
    build: .
    ports:
      - "8080:8080"
    environment:
      QUICKNOTES_DATA_FILE: /app/data/notes.json
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
